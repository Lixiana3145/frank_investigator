# Name of your application. Used to uniquely configure containers.
service: frank_investigator

# Name of the container image.
image: akitaonrails/frank_investigator

# Deploy to these servers (update with your actual server IP).
servers:
  web:
    - <%= ENV["DEPLOY_HOST"] || "192.168.0.1" %>

# Enable SSL auto certification via Let's Encrypt.
# Using an SSL proxy like this requires config.assume_ssl and config.force_ssl in production.rb.
proxy:
  ssl: true
  host: <%= ENV["DEPLOY_DOMAIN"] || "frank.example.com" %>

# GitHub Container Registry
registry:
  server: ghcr.io
  username: akitaonrails
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - OPENROUTER_API_KEY
    - JOBS_AUTH_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    JOB_CONCURRENCY: 3
    WEB_CONCURRENCY: 2
    RAILS_MAX_THREADS: 3
    ALLOWED_HOST: <%= ENV["DEPLOY_DOMAIN"] || "frank.example.com" %>
    JOBS_AUTH_USER: admin

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
  smoke: app exec "bin/rails frank:smoke_all"

# Use a persistent storage volume for sqlite database files and local Active Storage files.
volumes:
  - "frank_investigator_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404 on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
