#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  smoke_check:
    class: Monitoring::SmokeCheckJob
    queue: default
    schedule: every 6 hours
  purge_old_errors:
    command: "ErrorReport.purge_old"
    schedule: at 3am every day
  detect_stale_claims:
    class: Claims::DetectStalenessJob
    queue: default
    schedule: every 12 hours
  reassess_stale_claims:
    class: Claims::ReassessStaleClaimsJob
    queue: default
    schedule: at 4am every day
  detect_source_corrections:
    class: Claims::DetectSourceCorrectionsJob
    queue: default
    schedule: every 12 hours
  recover_stale_pipelines:
    command: |
      PipelineStep.where(status: "running").where("started_at < ?", 15.minutes.ago).find_each do |step|
        step.update!(status: :failed, error_message: "Recovered: step exceeded 15 minute timeout", finished_at: Time.current)
        Rails.logger.warn("[StaleRecovery] Marked #{step.name} as failed on investigation #{step.investigation_id}")
      end
      Investigation.where(status: "processing").find_each do |inv|
        Investigations::RefreshStatus.call(inv)
      end
    schedule: every 5 minutes
